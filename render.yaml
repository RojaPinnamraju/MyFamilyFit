services:
  - type: web
    name: familyfit-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false          # you paste the Neon URL in the Render dashboard
      - key: SECRET_KEY
        generateValue: true  # Render auto-generates a secure random value
      - key: APP_URL
        sync: false          # paste your Vercel URL after deploying frontend
      - key: EXTRA_CORS_ORIGINS
        sync: false          # paste your Vercel URL here too
      - key: TIMEZONE
        value: America/Los_Angeles
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
