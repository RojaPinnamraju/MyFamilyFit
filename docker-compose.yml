services:
  db:
    image: postgres:16-alpine
    container_name: familyfit-db
    environment:
      POSTGRES_DB: familyfit
      POSTGRES_USER: familyfit
      POSTGRES_PASSWORD: familyfit
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U familyfit -d familyfit"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: familyfit-backend
    environment:
      DATABASE_URL: postgresql://familyfit:familyfit@db:5432/familyfit
      SECRET_KEY: ${SECRET_KEY:-supersecretkey-change-in-production-use-256-bit-random-string}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-10080}
      DEBUG: ${DEBUG:-false}
      # Public URL used inside invite links (change for production)
      APP_URL: ${APP_URL:-http://localhost:5173}
      # SMTP — leave blank to disable email; invite link will show in UI instead
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_TLS: ${SMTP_TLS:-true}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    container_name: familyfit-frontend
    working_dir: /app
    command: sh -c "npm install --legacy-peer-deps && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    restart: unless-stopped

volumes:
  postgres_data:
  frontend_node_modules:
